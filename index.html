<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>Begleitinstrument — Stabile Version</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        html, body, #map { height: 100%; margin: 0; background: #fff; overflow: hidden; }
        #map { width: 100%; height: 100vh; }
        
        /* Die schwarze Route im Skizzen-Stil */
        .rough-path { filter: url(#roughFilter); stroke-linecap: round; }

        .top-ui { position: fixed; top: 12px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 8px; }
        .side-ui { position: fixed; top: 70px; right: 12px; z-index: 1000; width: 180px; display: flex; flex-direction: column; gap: 10px; }
        .bottom-left { position: fixed; bottom: 20px; left: 12px; z-index: 1000; display: flex; flex-direction: column; gap: 12px; }
        
        .panel { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #ddd; }
        .btn { padding: 10px 14px; border-radius: 10px; font-weight: bold; font-size: 11px; cursor: pointer; text-transform: uppercase; border: none; }
        .fab { width: 60px; height: 60px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 24px; border: none; box-shadow: 0 6px 12px rgba(0,0,0,0.2); cursor: pointer; }
        
        .walk-item { padding: 6px; border-bottom: 1px solid #eee; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <filter id="roughFilter">
    <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="4" />
  </filter>
</svg>

<div id="map"></div>

<div class="top-ui">
    <button id="startWalk" class="btn bg-blue-600 text-white">NEUER WALK</button>
    <button id="stopWalk" class="btn bg-red-600 text-white">BEENDEN</button>
    <button id="exportFull" class="btn bg-black text-white">ZIP</button>
</div>

<div class="side-ui">
    <div class="panel">
        <button id="styleToggle" class="btn bg-yellow-400 text-black w-full mb-3">ANSICHT WECHSELN</button>
        <p class="font-bold text-[9px] uppercase text-gray-400 mb-2 border-b">Ebenen</p>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="toggleTempo" type="checkbox" checked> <label>Route (Schwarz)</label></div>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="toggleMood" type="checkbox" checked> <label>Stimmung</label></div>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="toggleThought" type="checkbox" checked> <label>Gedanken</label></div>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="toggleSense" type="checkbox" checked> <label>Wahrnehmung</label></div>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="togglePhoto" type="checkbox" checked> <label>Fotos</label></div>
        <div class="flex items-center gap-2 mb-1 text-xs"><input id="toggleAudio" type="checkbox" checked> <label>Audio</label></div>
    </div>

    <div class="panel max-h-[150px] overflow-y-auto">
        <p class="font-bold text-[9px] uppercase text-gray-400 border-b mb-1">Archiv</p>
        <div id="walkList"></div>
    </div>
</div>

<div class="bottom-left">
    <button id="photoBtn" class="fab bg-white">📷</button>
    <button id="audioToggle" class="fab bg-orange-400 text-white">🔴</button>
    <button id="senseBtn" class="fab bg-[#3d633d] text-white">👁️</button>
    <button id="thoughtBtn" class="fab bg-[#12345f] text-white">💭</button>
    <button id="moodBtn" class="fab" style="background: radial-gradient(circle, #ff8c00, #ff4500);">🎭</button>
</div>

<script>
const state = {
    walks: [],
    current: null,
    map: null,
    currentStyle: 'standard',
    tiles: null,
    layers: { 
        tempo: L.layerGroup(), mood: L.layerGroup(), thought: L.layerGroup(), 
        sense: L.layerGroup(), photo: L.layerGroup(), audio: L.layerGroup() 
    }
};

let liveMarker = null;

function initMap() {
    state.map = L.map('map', { zoomControl: false }).setView([47.23, 9.61], 15);
    
    // Standard-Layer
    state.tiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.map);
    
    Object.values(state.layers).forEach(l => l.addTo(state.map));
    
    navigator.geolocation.watchPosition(pos => {
        const { latitude, longitude } = pos.coords;
        if (!liveMarker) {
            liveMarker = L.circleMarker([latitude, longitude], { radius: 8, fillColor: "#2563eb", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(state.map);
            state.map.panTo([latitude, longitude]);
        } else {
            liveMarker.setLatLng([latitude, longitude]);
        }
        if (state.current) {
            state.current.route.push([latitude, longitude]);
            renderRoute();
        }
    }, null, { enableHighAccuracy: true });
}

// ANSICHT WECHSELN
document.getElementById('styleToggle').onclick = () => {
    state.map.removeLayer(state.tiles);
    if (state.currentStyle === 'standard') {
        // Helle Ansicht (Ohne Straßennamen)
        state.tiles = L.tileLayer('https://{s}.tile.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png').addTo(state.map);
        state.currentStyle = 'bright';
    } else {
        // Standard
        state.tiles = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(state.map);
        state.currentStyle = 'standard';
    }
};

function renderRoute() {
    state.layers.tempo.clearLayers();
    if (state.current.route.length < 2) return;
    L.polyline(state.current.route, {
        color: 'black', weight: 4, opacity: 1, className: 'rough-path'
    }).addTo(state.layers.tempo);
}

document.getElementById('startWalk').onclick = () => {
    state.current = { id: new Date().toLocaleTimeString(), route: [], entries: [] };
    Object.values(state.layers).forEach(l => l.clearLayers());
    alert("Gestartet");
};

document.getElementById('stopWalk').onclick = () => {
    if (!state.current) return;
    state.walks.push(state.current);
    updateArchiveUI();
    state.current = null;
    alert("Gespeichert");
};

function addEntry(type, data = {}) {
    if (!state.current) return alert("Zuerst 'NEUER WALK' klicken!");
    const pos = liveMarker.getLatLng();
    let lat = pos.lat + (type === 'sense' || type === 'thought' ? (Math.random()-0.5)*0.0006 : 0);
    let lng = pos.lng + (type === 'sense' || type === 'thought' ? (Math.random()-0.5)*0.0006 : 0);
    const entry = { type, location: { lat, lng }, ...data };
    state.current.entries.push(entry);
    drawMarker(entry);
}

function drawMarker(e) {
    const loc = [e.location.lat, e.location.lng];
    if (e.type === 'mood') L.circleMarker(loc, { radius: 22, fillColor: '#ff4500', color: '#8b0000', weight: 2, fillOpacity: 0.7 }).addTo(state.layers.mood);
    else if (e.type === 'thought') L.circleMarker(loc, { radius: 7, fillColor: '#12345f', color: '#fff', weight: 1, fillOpacity: 0.9 }).addTo(state.layers.thought);
    else if (e.type === 'sense') L.circleMarker(loc, { radius: 9, fillColor: '#3d633d', color: '#1a2e1a', weight: 1.5, fillOpacity: 0.9 }).addTo(state.layers.sense);
    else if (e.type === 'photo') L.marker(loc).addTo(state.layers.photo).bindPopup(`<img src="${e.photo}" width="150">`);
    else if (e.type === 'audio') L.marker(loc).addTo(state.layers.audio).bindPopup(`Audio`);
}

function updateArchiveUI() {
    const list = document.getElementById('walkList');
    list.innerHTML = "";
    state.walks.forEach(w => {
        const div = document.createElement('div');
        div.className = "walk-item";
        div.innerText = "Tour " + w.id;
        div.onclick = () => {
            Object.values(state.layers).forEach(l => l.clearLayers());
            state.current = w; renderRoute(); w.entries.forEach(drawMarker); state.current = null;
        };
        list.appendChild(div);
    });
}

document.getElementById('senseBtn').onclick = () => addEntry('sense');
document.getElementById('thoughtBtn').onclick = () => addEntry('thought');
document.getElementById('moodBtn').onclick = () => addEntry('mood');
document.getElementById('photoBtn').onclick = () => {
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => addEntry('photo', { photo: ev.target.result });
        reader.readAsDataURL(e.target.files[0]);
    };
    input.click();
};

document.querySelectorAll('.panel input').forEach(input => {
    input.onchange = (e) => {
        const key = e.target.id.replace('toggle', '').toLowerCase();
        if (e.target.checked) state.map.addLayer(state.layers[key]);
        else state.map.removeLayer(state.layers[key]);
    };
});

initMap();
</script>
</body>

</html>
