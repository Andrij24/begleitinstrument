<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>Begleitinstrument PRO</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

    <style>
        html, body, #map { height: 100%; margin: 0; background: #fff; overflow: hidden; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; z-index: 1; }
        .top-ui, .side-ui, .bottom-left { z-index: 1000; position: fixed; }
        .top-ui {
            top: 12px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center;
        }
        .side-ui { top: 70px; right: 12px; width: 250px; display: flex; flex-direction: column; gap: 10px; }
        .bottom-left {
            bottom: 20px; left: 12px;
            display: grid; grid-template-columns: 55px 55px;
            gap: 10px; z-index: 1000; position: fixed;
        }
        .panel { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #ddd; }
        .btn { padding: 10px 14px; border-radius: 10px; font-weight: bold; font-size: 10px; cursor: pointer; text-transform: uppercase; border: none; }
        .fab { width: 55px; height: 55px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: none; box-shadow: 0 6px 12px rgba(0,0,0,0.2); cursor: pointer; z-index: 1001; }
        .walk-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 11px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .walk-item:hover { background-color: #f9f9f9; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 1px solid #ccc; }
        .dist-badge { font-size: 9px; color: #888; white-space: nowrap; margin-left: auto; }
        #liveDistDisplay {
            background: rgba(255,255,255,0.92); padding: 4px 10px;
            border-radius: 8px; font-size: 11px; font-weight: bold; color: #2563eb; display: none;
        }
        .no-print { display: none !important; }
        .rough-path { stroke-linecap: round; }
        #layerMenu {
            display: none; position: fixed; top: 50px; left: 50%; transform: translateX(-50%);
            z-index: 2000; background: white; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); border: 1px solid #ddd;
            padding: 10px; flex-direction: column; gap: 6px; min-width: 210px;
        }
        #layerMenu.open { display: flex; }
        .layer-option { text-align: left; font-size: 11px !important; padding: 8px 12px !important; }
        .layer-option.active { background: #dbeafe !important; color: #1d4ed8 !important; }
    </style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <filter id="roughFilter" x="-20%" y="-20%" width="140%" height="140%">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" />
  </filter>
</svg>

<div id="map"></div>

<div class="top-ui">
    <button id="startWalk" class="btn bg-blue-600 text-white">START</button>
    <button id="stopWalk" class="btn bg-red-600 text-white">STOP/SAVE</button>
    <button id="exportFull" class="btn bg-black text-white">ZIP EXPORT</button>
    <button id="layerBtn" class="btn bg-gray-100 text-gray-800">🗺️ LAYER</button>
    <span id="liveDistDisplay">📍 0 m</span>
</div>

<div id="layerMenu">
    <p style="font-size:10px;font-weight:bold;color:#888;text-transform:uppercase;margin-bottom:2px;padding:0 4px;">Kartenansicht</p>
    <button class="layer-option btn bg-gray-50 text-gray-800" data-layer="osm">🗺️ Standard</button>
    <button class="layer-option btn bg-gray-50 text-gray-800" data-layer="satellite">🛰️ Satellit</button>
    <button class="layer-option btn bg-gray-50 text-gray-800" data-layer="topo">🏔️ Topografie</button>
    <button class="layer-option btn bg-gray-50 text-gray-800" data-layer="bw">⬜ Graustufen</button>
    <button class="layer-option btn bg-gray-50 text-gray-800" data-layer="dark">🌑 Dunkel</button>
</div>

<div class="side-ui">
    <div class="panel max-h-[250px] overflow-y-auto">
        <p class="font-bold text-[10px] uppercase text-gray-500 mb-2 border-b">Vergleichs-Archiv</p>
        <div id="walkList"></div>
    </div>
    <div class="panel" id="reflectionPanel" style="display:none;">
        <p class="font-bold text-[10px] uppercase text-blue-600 mb-1">Reflexion: <span id="activeWalkName" class="text-gray-600"></span></p>
        <textarea id="reflectionText" class="w-full text-xs p-2 border rounded h-32 mb-2" placeholder="Deine Analyse hier..."></textarea>
        <button id="saveReflection" class="btn bg-blue-100 text-blue-700 w-full">Reflexion Speichern</button>
    </div>
</div>

<div class="bottom-left">
    <button id="photoBtn"      class="fab bg-white">📸</button>
    <button id="audioToggle"   class="fab bg-orange-400 text-white">▶️</button>
    <button id="senseBtn"      class="fab bg-[#3d633d] text-white">👁️</button>
    <button id="thoughtBtn"    class="fab bg-[#12345f] text-white">💭</button>
    <button id="messageToggle" class="fab bg-orange-400 text-white">💬</button>
    <button id="moodBtn"       class="fab" style="background:radial-gradient(circle,#ff8c00,#ff4500);">🔋</button>
</div>

<script>
// ============================================================
// GeoUtils
// ============================================================
class GeoUtils {
    static toRad(angle) { return angle * Math.PI / 180; }
    static haversineDistance(lat1, lon1, lat2, lon2) {
        const R = 6371;
        const dLat = GeoUtils.toRad(lat2 - lat1);
        const dLon = GeoUtils.toRad(lon2 - lon1);
        const a =
            Math.sin(dLat / 2) ** 2 +
            Math.cos(GeoUtils.toRad(lat1)) *
            Math.cos(GeoUtils.toRad(lat2)) *
            Math.sin(dLon / 2) ** 2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }
    static formatDistance(km) {
        if (km < 1) return `${Math.round(km * 1000)} m`;
        return `${km.toFixed(2)} km`;
    }
}

// ============================================================
// KONFIGURATION
// ============================================================
const walkColors = ['#e6194b','#3cb44b','#ffe119','#4363d8','#f58231','#911eb4','#46f0f0','#f032e6'];

const tileLayers = {
    osm:       { url: 'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', attribution: '© OpenStreetMap' },
    satellite: { url: 'https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}', attribution: '© Google Satellite' },
    topo:      { url: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', attribution: '© OpenTopoMap' },
    bw:        { url: 'https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', attribution: '© CartoDB' },
    dark:      { url: 'https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', attribution: '© CartoDB' }
};

// ============================================================
// STATE
// ============================================================
const state = {
    walks: JSON.parse(localStorage.getItem('psychogeo_walks') || '[]'),
    current: null,
    map: null,
    liveMarker: null,
    activeComparisonLayers: {},
    currentTileLayer: null,
    audioRecorder: null,
    audioChunks: [],
    isRecording: false,
    sessionAudioBlobs: {}
};

// ============================================================
// LAYER SWITCHER
// ============================================================
function switchLayer(key) {
    if (!state.map) return;
    const config = tileLayers[key];
    if (!config) return;

    if (state.currentTileLayer) {
        state.map.removeLayer(state.currentTileLayer);
        state.currentTileLayer = null;
    }
    state.currentTileLayer = L.tileLayer(config.url, {
        crossOrigin: true, attribution: config.attribution, maxZoom: 19
    });
    state.currentTileLayer.addTo(state.map);
    state.currentTileLayer.bringToBack();

    document.querySelectorAll('.layer-option').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.layer === key);
    });
    localStorage.setItem('psychogeo_layer', key);
    document.getElementById('layerMenu').classList.remove('open');
}

document.getElementById('layerBtn').onclick = (e) => {
    e.stopPropagation();
    document.getElementById('layerMenu').classList.toggle('open');
};
document.querySelectorAll('.layer-option').forEach(btn => {
    btn.onclick = () => switchLayer(btn.dataset.layer);
});
document.addEventListener('click', (e) => {
    if (!e.target.closest('#layerMenu') && e.target.id !== 'layerBtn') {
        document.getElementById('layerMenu').classList.remove('open');
    }
});

// ============================================================
// INITIALISIERUNG
// ============================================================
function initMap() {
    state.map = L.map('map', { zoomControl: false, preferCanvas: false }).setView([47.23, 9.61], 15);
    const savedLayer = localStorage.getItem('psychogeo_layer') || 'osm';
    switchLayer(savedLayer);
    navigator.geolocation.watchPosition(onLocationUpdate, onLocationError, { enableHighAccuracy: true });
    updateArchiveUI();
}

// ============================================================
// GEOLOCATION
// ============================================================
function onLocationUpdate(pos) {
    const { latitude, longitude } = pos.coords;
    const latlng = [latitude, longitude];
    const now = Date.now();

    if (!state.liveMarker) {
        state.liveMarker = L.circleMarker(latlng, {
            radius: 8, fillColor: "#2563eb", color: "#fff", weight: 2, fillOpacity: 1
        }).addTo(state.map);
        state.map.panTo(latlng);
    } else {
        state.liveMarker.setLatLng(latlng);
    }

    if (state.current) {
        const route = state.current.route;
        const times = state.current.routeTimes;

        if (route.length > 0) {
            const prev      = route[route.length - 1];
            const prevTime  = times[times.length - 1];
            const segmentKm = GeoUtils.haversineDistance(prev[0], prev[1], latitude, longitude);
            state.current.totalDistance += segmentKm;

            const dtHours  = (now - prevTime) / 3600000;
            const speedKmh = dtHours > 0 ? segmentKm / dtHours : 0;
            drawSpeedSegment([prev, latlng], speedKmh);

            document.getElementById('liveDistDisplay').textContent =
                `📍 ${GeoUtils.formatDistance(state.current.totalDistance)}`;
        }
        route.push(latlng);
        times.push(now);
    }
}

function onLocationError(err) { console.warn("GPS: " + err.message); }
function updateLiveRouteDisplay() {}

// ============================================================
// SPEED SEGMENT
// ============================================================
function drawSpeedSegment(points, speedKmh) {
    const MAX_SPEED = 6;
    const ratio   = Math.min(speedKmh / MAX_SPEED, 1);
    const weight  = Math.round(14 - ratio * 13);
    const opacity = 0.9 - ratio * 0.84;
    const color   = state.current ? state.current.color : '#2563eb';

    const seg = L.polyline(points, {
        color, weight, opacity, lineCap: 'round', lineJoin: 'round', className: 'rough-path'
    }).addTo(state.map);

    const el = seg.getElement();
    if (el) el.setAttribute('filter', 'url(#roughFilter)');

    if (state.current) {
        if (!state.current.segments) state.current.segments = [];
        state.current.segments.push(seg);
    }
}

// ============================================================
// WALK STEUERUNG
// ============================================================
document.getElementById('startWalk').onclick = () => {
    if (state.current) return alert("Walk läuft bereits!");
    clearAllComparisonLayers();
    const color = walkColors[state.walks.length % walkColors.length];
    state.current = {
        id: Date.now(), startTime: new Date().toISOString(),
        name: new Date().toLocaleString('de-DE'),
        route: [], routeTimes: [], segments: [],
        entries: [], color, reflection: "", totalDistance: 0
    };
    const display = document.getElementById('liveDistDisplay');
    display.style.display = 'inline-block';
    display.textContent = '📍 0 m';
    alert("Aufzeichnung gestartet!");
};

document.getElementById('stopWalk').onclick = () => {
    if (!state.current) return alert("Kein aktiver Walk!");
    if (state.current.route.length < 2) {
        if (!confirm("Strecke ist sehr kurz. Trotzdem speichern?")) return;
    }
    state.current.totalDistance = parseFloat(state.current.totalDistance.toFixed(4));
    state.current.segments = [];
    state.walks.push(state.current);
    saveToLocalStorage();
    updateArchiveUI();
    document.getElementById('liveDistDisplay').style.display = 'none';
    const savedDist = state.current.totalDistance;
    state.current = null;
    alert(`Walk gespeichert. Strecke: ${GeoUtils.formatDistance(savedDist)}`);
};

// ============================================================
// DATENERHEBUNG
// ============================================================
function addEntry(type, data = {}) {
    if (!state.current) return alert("Bitte erst START drücken!");
    if (!state.liveMarker) return alert("Warte auf GPS Signal...");
    const pos = state.liveMarker.getLatLng();

    const processEntry = (finalData) => {
        const entry = {
            type,
            location: { lat: pos.lat, lng: pos.lng },
            timestamp: new Date().toLocaleTimeString('de-DE'),
            isoDate: new Date().toISOString(),
            ...finalData
        };
        state.current.entries.push(entry);
        drawTempMarker(entry);
    };

    if (['mood','thought','sense'].includes(type)) {
        const prompts = { mood: "Stimmung beschreiben:", thought: "Gedanke?", sense: "Wahrnehmung?" };
        const text = prompt(prompts[type]);
        if (text === null) return;
        processEntry({ text: text || "(Keine Eingabe)" });
    } else {
        processEntry(data);
    }
}

// ============================================================
// TEMP MARKER — ✅ alle klickbar mit Popup
// ============================================================
let tempLayerGroup = L.layerGroup();
function drawTempMarker(e) {
    if (!tempLayerGroup.getBounds().isValid()) tempLayerGroup.addTo(state.map);
    const loc = [e.location.lat, e.location.lng];

    if (['mood','thought','sense'].includes(e.type)) {
        const icon = { mood: '🔋', thought: '💭', sense: '👁️' }[e.type];
        L.circleMarker(loc, {
            radius: 8, fillColor: '#2563eb', color: '#fff', weight: 2, fillOpacity: 1
        })
        .addTo(tempLayerGroup)
        .bindPopup(`
            <b>${icon} ${e.type.toUpperCase()}</b><br>
            <span style="font-size:12px">${e.text || '(Keine Eingabe)'}</span><br>
            <span style="font-size:10px;color:#888">🕐 ${e.timestamp}</span>
        `);

    } else if (e.type === 'photo') {
        L.marker(loc, { icon: L.divIcon({ html: '📸', className: 'text-lg' }) })
        .addTo(tempLayerGroup)
        .bindPopup(`
            <b>📸 FOTO</b><br>
            <img src="${e.photo}" style="width:160px;border-radius:6px;margin-top:4px"><br>
            <span style="font-size:10px;color:#888">🕐 ${e.timestamp}</span>
        `);

    } else if (['Sound','Sprachnachricht'].includes(e.type)) {
        const iconTxt = e.type === 'Sound' ? '🔊' : '💬';
        L.marker(loc, { icon: L.divIcon({ html: iconTxt, className: 'text-lg' }) })
        .addTo(tempLayerGroup)
        .bindPopup(`
            <b>${iconTxt} ${e.type.toUpperCase()}</b><br>
            <audio controls src="${e.audioUrl}" style="margin-top:4px;width:160px"></audio><br>
            <span style="font-size:10px;color:#888">🕐 ${e.timestamp}</span>
        `);
    }
}

// ============================================================
// VERGLEICH
// ============================================================
function toggleWalkComparison(id) {
    const walkId = parseInt(id);
    const walk = state.walks.find(w => w.id === walkId);
    if (!walk) return;

    if (state.current) {
        alert("Bitte beende erst die aktuelle Aufnahme.");
        updateArchiveUI();
        return;
    }

    if (state.activeComparisonLayers[walkId]) {
        state.map.removeLayer(state.activeComparisonLayers[walkId]);
        delete state.activeComparisonLayers[walkId];
        hideReflectionPanel();
    } else {
        const group = L.layerGroup();
        const polyline = L.polyline(walk.route, {
            color: walk.color, weight: 5, opacity: 0.75,
            lineCap: 'round', lineJoin: 'round', className: 'rough-path'
        }).addTo(group);
        const el = polyline.getElement();
        if (el) el.setAttribute('filter', 'url(#roughFilter)');

        walk.entries.forEach(e => {
            const loc = [e.location.lat, e.location.lng];
            if (['mood','thought','sense'].includes(e.type)) {
                const icon = { mood: '🔋', thought: '💭', sense: '👁️' }[e.type];
                L.circleMarker(loc, {
                    radius: 8, fillColor: walk.color, color: '#fff', weight: 2, fillOpacity: 1
                }).addTo(group).bindPopup(`
                    <b>${icon} ${e.type.toUpperCase()}</b><br>
                    <span style="font-size:12px">${e.text || ''}</span><br>
                    <span style="font-size:10px;color:#888">🕐 ${e.timestamp}</span>
                `);
            } else if (e.type === 'photo') {
                L.marker(loc, { icon: L.divIcon({ html: '📸', className: 'text-lg' }) })
                .addTo(group).bindPopup(`
                    <b>📸 FOTO</b><br>
                    <img src="${e.photo}" style="width:160px;border-radius:6px;margin-top:4px"><br>
                    <span style="font-size:10px;color:#888">🕐 ${e.timestamp}</span>
                `);
            } else if (['Sound','Sprachnachricht'].includes(e.type)) {
                const iconTxt = e.type === 'Sound' ? '🔊' : '💬';
                L.marker(loc, { icon: L.divIcon({ html: iconTxt, className: 'text-lg' }) })
                .addTo(group).bindPopup(`
                    <b>${iconTxt} ${e.type.toUpperCase()}</b><br>
                    <audio controls src="${e.audioUrl}" style="margin-top:4px;width:160px"></audio><br>
                    <span style="font-size:10px;color:#888">🕐 ${e.timestamp}</span>
                `);
            }
        });

        group.addTo(state.map);
        state.activeComparisonLayers[walkId] = group;
        showReflectionPanel(walk);
    }
}

function clearAllComparisonLayers() {
    Object.values(state.activeComparisonLayers).forEach(l => state.map.removeLayer(l));
    state.activeComparisonLayers = {};
    hideReflectionPanel();
    updateArchiveUI();
}

// ============================================================
// REFLEXION
// ============================================================
function showReflectionPanel(walk) {
    document.getElementById('reflectionPanel').style.display = 'block';
    document.getElementById('activeWalkName').innerText = walk.name;
    const ta = document.getElementById('reflectionText');
    ta.value = walk.reflection || "";
    ta.dataset.activeWalkId = walk.id;
}
function hideReflectionPanel() {
    document.getElementById('reflectionPanel').style.display = 'none';
}
document.getElementById('saveReflection').onclick = () => {
    const ta = document.getElementById('reflectionText');
    const walkId = parseInt(ta.dataset.activeWalkId);
    if (!walkId) return;
    const walk = state.walks.find(w => w.id === walkId);
    if (walk) { walk.reflection = ta.value; saveToLocalStorage(); alert("Reflexion gespeichert."); }
};

// ============================================================
// STORAGE
// ============================================================
function saveToLocalStorage() {
    const cleanWalks = state.walks.map(w => ({
        ...w, segments: [],
        entries: w.entries.map(e => { const { audioBlob, ...clean } = e; return clean; })
    }));
    localStorage.setItem('psychogeo_walks', JSON.stringify(cleanWalks));
}

// ============================================================
// UI
// ============================================================
function updateArchiveUI() {
    const list = document.getElementById('walkList');
    list.innerHTML = "";
    if (state.walks.length === 0) {
        list.innerHTML = "<p class='text-xs text-gray-400 p-2'>Noch keine Walks gespeichert.</p>";
        return;
    }
    state.walks.forEach(w => {
        const isActive  = !!state.activeComparisonLayers[w.id];
        const distLabel = w.totalDistance > 0 ? GeoUtils.formatDistance(w.totalDistance) : '— m';
        const div = document.createElement('div');
        div.className = "walk-item";
        div.innerHTML = `
            <input type="checkbox" ${isActive ? 'checked' : ''} onchange="toggleWalkComparison(${w.id})">
            <span class="color-dot" style="background:${w.color}"></span>
            <span class="flex-grow">${w.name}</span>
            <span class="dist-badge">📏 ${distLabel}</span>
        `;
        list.appendChild(div);
    });
}

// ============================================================
// AUDIO
// ============================================================
async function handleRecording(buttonId, type) {
    if (!state.current) return alert("Bitte erst START drücken!");
    const btn = document.getElementById(buttonId);
    if (!state.isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            state.audioRecorder = new MediaRecorder(stream);
            state.audioChunks   = [];
            state.audioRecorder.ondataavailable = e => state.audioChunks.push(e.data);
            state.audioRecorder.onstop = () => {
                const blob     = new Blob(state.audioChunks, { type: 'audio/webm' });
                const audioUrl = URL.createObjectURL(blob);
                const key      = `audio_${Date.now()}`;
                state.sessionAudioBlobs[key] = blob;
                addEntry(type, { audioUrl, audioBlobKey: key });
            };
            state.audioRecorder.start();
            state.isRecording = true;
            btn.innerText = "⏹️";
            btn.classList.replace('bg-orange-400', 'bg-red-600');
        } catch (err) { alert("Mikro-Zugriff verweigert."); }
    } else {
        state.audioRecorder.stop();
        state.isRecording = false;
        btn.innerText = type === 'Sound' ? "▶️" : "💬";
        btn.classList.replace('bg-red-600', 'bg-orange-400');
    }
}

document.getElementById('audioToggle').onclick   = () => handleRecording('audioToggle', 'Sound');
document.getElementById('messageToggle').onclick = () => handleRecording('messageToggle', 'Sprachnachricht');
document.getElementById('moodBtn').onclick       = () => addEntry('mood');
document.getElementById('thoughtBtn').onclick    = () => addEntry('thought');
document.getElementById('senseBtn').onclick      = () => addEntry('sense');

document.getElementById('photoBtn').onclick = () => {
    if (!state.current) return alert("Bitte erst START drücken!");
    const input = document.createElement('input');
    input.type = 'file'; input.accept = 'image/*';
    input.onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => addEntry('photo', { photo: ev.target.result });
        reader.readAsDataURL(e.target.files[0]);
    };
    input.click();
};

// ============================================================
// SCREENSHOT ENGINE
// ============================================================
async function waitForTiles() {
    return new Promise(resolve => {
        const check = () => {
            const tiles = document.querySelectorAll('.leaflet-tile');
            const allLoaded = Array.from(tiles).every(t => t.complete && t.naturalWidth > 0);
            if (allLoaded && tiles.length > 0) resolve();
            else setTimeout(check, 200);
        };
        check();
    });
}

function applyFilterInline() {
    document.querySelectorAll('.rough-path').forEach(el => el.setAttribute('filter', 'url(#roughFilter)'));
}
function removeFilterInline() {
    document.querySelectorAll('.rough-path').forEach(el => el.removeAttribute('filter'));
}

function showAllEntryLabels(walksArr) {
    walksArr.forEach(walk => {
        walk.entries.forEach(e => {
            if (!['mood','thought','sense'].includes(e.type)) return;
            const icon = { mood: '🔋', thought: '💭', sense: '👁️' }[e.type];
            const label = L.marker([e.location.lat, e.location.lng], {
                icon: L.divIcon({
                    html: `<div style="
                        background:white; border:2px solid ${walk.color};
                        border-radius:6px; padding:2px 6px; font-size:9px;
                        font-family:sans-serif; white-space:nowrap;
                        box-shadow:0 1px 4px rgba(0,0,0,0.2);
                        max-width:130px; overflow:hidden; text-overflow:ellipsis;
                    ">${icon} ${(e.text||'').slice(0,30)}${e.text&&e.text.length>30?'…':''}</div>`,
                    className: '', iconAnchor: [0,0]
                }),
                zIndexOffset: 1000, interactive: false
            }).addTo(state.map);
            label._isExportLabel = true;
        });
    });
}

function removeAllEntryLabels() {
    state.map.eachLayer(layer => {
        if (layer._isExportLabel) state.map.removeLayer(layer);
    });
}

async function takeReflectionScreenshot(walksArr, kartenFolder, isComparison) {
    const allPoints = walksArr.flatMap(w => w.route);
    if (allPoints.length > 1) {
        state.map.fitBounds(L.latLngBounds(allPoints), { padding: [60,60], animate: false, maxZoom: 17 });
        state.map.invalidateSize();
        await new Promise(r => setTimeout(r, 700));
    }
    await waitForTiles();
    await new Promise(r => setTimeout(r, 400));
    showAllEntryLabels(walksArr);
    await new Promise(r => setTimeout(r, 150));
    applyFilterInline();

    const canvas = await html2canvas(document.getElementById('map'), {
        useCORS: true, allowTaint: false, logging: false,
        scale: Math.max(window.devicePixelRatio * 2, 3),
        ignoreElements: (el) => el.classList.contains('no-print'),
        onclone: (clonedDoc) => {
            const svg = document.querySelector('svg[width="0"]');
            if (svg) clonedDoc.body.appendChild(svg.cloneNode(true));
            clonedDoc.querySelectorAll('.rough-path').forEach(el => {
                el.setAttribute('filter', 'url(#roughFilter)');
            });
        }
    });

    removeFilterInline();
    removeAllEntryLabels();

    const filename = isComparison
        ? `VERGLEICH_${new Date().toISOString().slice(0,10)}.png`
        : `ROUTE_${walksArr[0].id}_${new Date().toISOString().slice(0,10)}.png`;
    kartenFolder.file(filename, canvas.toDataURL("image/png").split(',')[1], { base64: true });
}

// ============================================================
// ZIP EXPORT
// ============================================================
document.getElementById('exportFull').onclick = async () => {
    const activeIds = Object.keys(state.activeComparisonLayers);
    const isComparisonExport = activeIds.length > 0;

    const walksToExport = isComparisonExport
        ? activeIds.map(id => state.walks.find(w => w.id == id)).filter(Boolean)
        : [state.current || state.walks[state.walks.length - 1]];

    if (!walksToExport[0]) return alert("Kein Walk zum Exportieren.");

    const btn = document.getElementById('exportFull');
    const originalText = btn.innerText;
    btn.disabled = true;

    const uiElements = document.querySelectorAll('.top-ui, .side-ui, .bottom-left, .leaflet-control-zoom, .leaflet-control-attribution');
    uiElements.forEach(el => el.classList.add('no-print'));

    try {
        const zip          = new JSZip();
        const kartenFolder = zip.folder("Karten");
        const fotoFolder   = zip.folder("Fotos");
        const audioFolder  = zip.folder("Audio");

        btn.innerText = "⏳ Karte...";
        await takeReflectionScreenshot(walksToExport, kartenFolder, isComparisonExport);

        btn.innerText = "⏳ Protokoll...";
        walksToExport.forEach(walk => {
            let dauerStr = 'unbekannt';
            if (walk.startTime && walk.entries.length > 0) {
                const start = new Date(walk.startTime);
                const last  = new Date(walk.entries[walk.entries.length - 1].isoDate);
                const min   = Math.round((last - start) / 60000);
                dauerStr    = min > 0 ? `${min} Minuten` : '< 1 Minute';
            }

            const stimmungen  = walk.entries.filter(e => e.type === 'mood');
            const gedanken    = walk.entries.filter(e => e.type === 'thought');
            const wahrnehmung = walk.entries.filter(e => e.type === 'sense');
            const fotos       = walk.entries.filter(e => e.type === 'photo');
            const sounds      = walk.entries.filter(e => e.type === 'Sound');
            const nachrichten = walk.entries.filter(e => e.type === 'Sprachnachricht');

            let txt = '';
            txt += `╔══════════════════════════════════════════╗\n`;
            txt += `  BEGLEITINSTRUMENT — WALK PROTOKOLL\n`;
            txt += `╚══════════════════════════════════════════╝\n\n`;
            txt += `NAME:       ${walk.name}\n`;
            txt += `ID:         ${walk.id}\n`;
            txt += `START:      ${new Date(walk.startTime).toLocaleString('de-DE')}\n`;
            txt += `DAUER:      ${dauerStr}\n`;
            txt += `STRECKE:    ${GeoUtils.formatDistance(walk.totalDistance || 0)}\n`;
            txt += `GPS-PUNKTE: ${walk.route.length}\n`;
            txt += `\n──────────── EINTRÄGE ÜBERSICHT ──────────\n`;
            txt += `🔋 Stimmungen:        ${stimmungen.length}\n`;
            txt += `💭 Gedanken:          ${gedanken.length}\n`;
            txt += `👁️  Wahrnehmung:       ${wahrnehmung.length}\n`;
            txt += `📸 Fotos:             ${fotos.length}\n`;
            txt += `🔊 Sounds:            ${sounds.length}\n`;
            txt += `💬 Sprachnachrichten: ${nachrichten.length}\n`;
            txt += `   GESAMT:            ${walk.entries.length}\n`;

            if (walk.reflection) {
                txt += `\n──────────────── REFLEXION ───────────────\n`;
                txt += `${walk.reflection}\n`;
            }

            txt += `\n──────────────── CHRONOLOGIE ─────────────\n`;
            walk.entries.forEach((e, i) => {
                txt += `\n[${String(i+1).padStart(2,'0')}] ${e.timestamp} | ${e.type.toUpperCase()}\n`;
                txt += `     📍 ${e.location.lat.toFixed(6)}, ${e.location.lng.toFixed(6)}\n`;
                if (e.text) txt += `     → ${e.text}\n`;
                if (e.type === 'photo') txt += `     → Foto: /Fotos/Walk_${walk.id}_${e.timestamp.replace(/:/g,'-')}_${i}.jpg\n`;
                if (['Sound','Sprachnachricht'].includes(e.type)) {
                    txt += `     → Audio: /Audio/Walk_${walk.id}_${e.type}_${e.timestamp.replace(/:/g,'-')}_${i}.webm\n`;
                }
            });

            txt += `\n══════════════════════════════════════════\n`;
            txt += `  GPS-KOORDINATEN\n`;
            txt += `══════════════════════════════════════════\n`;
            walk.route.forEach((p, idx) => {
                txt += `${idx+1}: ${p[0].toFixed(6)}, ${p[1].toFixed(6)}\n`;
            });

            zip.file(`PROTOKOLL_${walk.id}.txt`, txt);
            zip.file(`rohdaten_${walk.id}.json`, JSON.stringify(walk, null, 2));

            fotos.forEach((e, i) => {
                if (e.photo) {
                    fotoFolder.file(
                        `Walk_${walk.id}_${e.timestamp.replace(/:/g,'-')}_${i}.jpg`,
                        e.photo.split(',')[1], { base64: true }
                    );
                }
            });

            walk.entries.forEach((e, i) => {
                if (['Sound','Sprachnachricht'].includes(e.type) && e.audioBlobKey) {
                    const blob = state.sessionAudioBlobs[e.audioBlobKey];
                    if (blob) {
                        audioFolder.file(
                            `Walk_${walk.id}_${e.type}_${e.timestamp.replace(/:/g,'-')}_${i}.webm`,
                            blob
                        );
                    }
                }
            });
        });

        let readme = `BEGLEITINSTRUMENT — ZIP EXPORT\n`;
        readme += `Erstellt: ${new Date().toLocaleString('de-DE')}\n\n`;
        readme += `INHALT:\n`;
        readme += `  Karten/         → Reflexions-Screenshot (Rough-Linien + Labels, 3x Auflösung)\n`;
        readme += `  Fotos/          → Alle aufgenommenen Fotos\n`;
        readme += `  Audio/          → Sound & Sprachnachrichten als .webm\n`;
        readme += `  PROTOKOLL_*.txt → Vollprotokoll mit Chronologie und GPS\n`;
        readme += `  rohdaten_*.json → Rohdaten als JSON\n\n`;
        readme += `HINWEIS: Audio nur aus der aktuellen Session exportierbar.\n\n`;
        readme += `WALKS:\n`;
        walksToExport.forEach(w => {
            readme += `  • ${w.name} | ${GeoUtils.formatDistance(w.totalDistance||0)} | ${w.entries.length} Einträge\n`;
        });
        zip.file("README.txt", readme);

        btn.innerText = "⏳ Packe ZIP...";
        const content = await zip.generateAsync({ type: "blob", compression: "DEFLATE" });
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        const ts = new Date().toISOString().slice(0,10);
        link.download = isComparisonExport
            ? `Vergleich_${ts}.zip`
            : `Walk_${walksToExport[0].id}_${ts}.zip`;
        link.click();

    } catch (err) {
        console.error(err);
        alert("Export fehlgeschlagen. Konsole prüfen.");
    } finally {
        removeFilterInline();
        removeAllEntryLabels();
        uiElements.forEach(el => el.classList.remove('no-print'));
        btn.innerText = originalText;
        btn.disabled = false;
    }
};

// Start
initMap();
</script>
