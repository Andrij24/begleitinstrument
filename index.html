<!doctype html>
<html lang="de">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
    <title>Begleitinstrument PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        html, body, #map { height: 100%; margin: 0; background: #fff; overflow: hidden; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; z-index: 1; }
        .top-ui, .side-ui, .bottom-left { z-index: 1000; position: fixed; }
        .top-ui { top: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 8px; align-items: center; }
        .side-ui { top: 70px; right: 12px; width: 250px; display: flex; flex-direction: column; gap: 10px; }
        .bottom-left { bottom: 20px; left: 12px; display: grid; grid-template-columns: 55px 55px; gap: 10px; }
        .panel { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.15); border: 1px solid #ddd; }
        .btn { padding: 10px 14px; border-radius: 10px; font-weight: bold; font-size: 10px; cursor: pointer; text-transform: uppercase; border: none; }
        .fab { width: 55px; height: 55px; border-radius: 30px; display: flex; align-items: center; justify-content: center; font-size: 22px; border: none; box-shadow: 0 6px 12px rgba(0,0,0,0.2); cursor: pointer; z-index: 1001; }
        .walk-item { padding: 8px; border-bottom: 1px solid #eee; font-size: 11px; display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .walk-item:hover { background-color: #f9f9f9; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 1px solid #ccc; }
        .no-print { display: none !important; }
        .rough-path { stroke-linecap: round; }

        #layerMenu {
            display: none;
            position: fixed;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid #ddd;
            padding: 10px;
            flex-direction: column;
            gap: 6px;
            min-width: 200px;
        }
        #layerMenu.open { display: flex; }
        .layer-btn {
            text-align: left; padding: 8px 12px; border-radius: 8px;
            border: none; cursor: pointer; font-size: 11px;
            background: #f5f5f5; color: #333;
        }
        .layer-btn.active { background: #dbeafe; color: #1d4ed8; font-weight: bold; }
    </style>
</head>
<body>

<svg width="0" height="0" style="position:absolute">
  <filter id="roughFilter">
    <feTurbulence type="fractalNoise" baseFrequency="0.03" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" />
  </filter>
</svg>

<div id="map"></div>

<div class="top-ui">
    <button id="startWalk" class="btn bg-blue-600 text-white">START</button>
    <button id="stopWalk" class="btn bg-red-600 text-white">STOP/SAVE</button>
    <button id="exportFull" class="btn bg-black text-white">ZIP EXPORT</button>
    <button id="layerToggleBtn" class="btn bg-gray-100 text-gray-700">&#x1F5FA; LAYER</button>
</div>

<div id="layerMenu">
    <p style="font-size:10px;font-weight:bold;color:#999;text-transform:uppercase;padding:0 4px 4px">Kartenansicht</p>
    <button class="layer-btn active" data-url="https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png">Standard</button>
    <button class="layer-btn" data-url="https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}">Satellit</button>
    <button class="layer-btn" data-url="https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png">Topografie</button>
    <button class="layer-btn" data-url="https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png">Graustufen</button>
    <button class="layer-btn" data-url="https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png">Dunkel</button>
</div>

<div class="side-ui">
    <div class="panel max-h-[250px] overflow-y-auto">
        <p class="font-bold text-[10px] uppercase text-gray-500 mb-2 border-b">Vergleichs-Archiv</p>
        <div id="walkList"></div>
    </div>
    <div class="panel" id="reflectionPanel" style="display:none;">
        <p class="font-bold text-[10px] uppercase text-blue-600 mb-1">Reflexion: <span id="activeWalkName" class="text-gray-600"></span></p>
        <textarea id="reflectionText" class="w-full text-xs p-2 border rounded h-32 mb-2" placeholder="Deine Analyse hier..."></textarea>
        <button id="saveReflection" class="btn bg-blue-100 text-blue-700 w-full">Reflexion Speichern</button>
    </div>
</div>

<div class="bottom-left">
    <button id="photoBtn" class="fab bg-white">📸</button>
    <button id="audioToggle" class="fab bg-orange-400 text-white">▶️</button>
    <button id="senseBtn" class="fab bg-[#3d633d] text-white">👁️</button>
    <button id="thoughtBtn" class="fab bg-[#12345f] text-white">💭</button>
    <button id="messageToggle" class="fab bg-orange-400 text-white">💬</button>
    <button id="moodBtn" class="fab" style="background: radial-gradient(circle, #ff8c00, #ff4500);">🔋</button>
</div>

<script>
const walkColors = ['#e6194b','#3cb44b','#ffe119','#4363d8','#f58231','#911eb4','#46f0f0','#f032e6'];

const state = {
    walks: JSON.parse(localStorage.getItem('psychogeo_walks') || '[]'),
    current: null, map: null, liveMarker: null, liveRouteLayer: null,
    activeComparisonLayers: {}, currentTileLayer: null,
    audioRecorder: null, audioChunks: [], isRecording: false
};

function initMap() {
    state.map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([47.23, 9.61], 15);
    state.currentTileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        crossOrigin: true, attribution: '© OpenStreetMap'
    }).addTo(state.map);
    navigator.geolocation.watchPosition(onLocationUpdate, onLocationError, { enableHighAccuracy: true });
    updateArchiveUI();
}

// --- LAYER SWITCHER ---
document.getElementById('layerToggleBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    document.getElementById('layerMenu').classList.toggle('open');
});
document.addEventListener('click', function(e) {
    if (!document.getElementById('layerMenu').contains(e.target) && e.target.id !== 'layerToggleBtn') {
        document.getElementById('layerMenu').classList.remove('open');
    }
});
document.querySelectorAll('.layer-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        if (state.currentTileLayer) state.map.removeLayer(state.currentTileLayer);
        state.currentTileLayer = L.tileLayer(btn.getAttribute('data-url'), {
            crossOrigin: true, maxZoom: 19
        }).addTo(state.map);
        state.currentTileLayer.bringToBack();
        document.querySelectorAll('.layer-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('layerMenu').classList.remove('open');
    });
});

// --- GPS ---
function onLocationUpdate(pos) {
    const { latitude, longitude } = pos.coords;
    const latlng = [latitude, longitude];
    if (!state.liveMarker) {
        state.liveMarker = L.circleMarker(latlng, { radius: 8, fillColor: "#2563eb", color: "#fff", weight: 2, fillOpacity: 1 }).addTo(state.map);
        state.map.panTo(latlng);
    } else { state.liveMarker.setLatLng(latlng); }
    if (state.current) { state.current.route.push(latlng); updateLiveRouteDisplay(); }
}
function onLocationError(err) { console.warn("GPS: " + err.message); }
function updateLiveRouteDisplay() {
    if (state.liveRouteLayer) state.map.removeLayer(state.liveRouteLayer);
    if (state.current && state.current.route.length > 1) {
        state.liveRouteLayer = L.polyline(state.current.route, { color: '#2563eb', weight: 3, dashArray: '5,10', opacity: 0.5 }).addTo(state.map);
    }
}

// --- START / STOP ---
document.getElementById('startWalk').onclick = () => {
    if (state.current) return alert("Walk läuft bereits!");
    clearAllComparisonLayers();
    state.current = {
        id: Date.now(), startTime: new Date().toISOString(),
        name: new Date().toLocaleString('de-DE'),
        route: [], entries: [], color: walkColors[state.walks.length % walkColors.length], reflection: ""
    };
    alert("Aufzeichnung gestartet!");
};
document.getElementById('stopWalk').onclick = () => {
    if (!state.current) return alert("Kein aktiver Walk!");
    if (state.current.route.length < 2 && !confirm("Strecke sehr kurz. Trotzdem speichern?")) return;
    state.walks.push(state.current);
    saveToLocalStorage(); updateArchiveUI();
    if (state.liveRouteLayer) state.map.removeLayer(state.liveRouteLayer);
    state.current = null;
    alert("Walk gespeichert.");
};

// --- EINTRAEGE ---
function addEntry(type, data = {}) {
    if (!state.current) return alert("Bitte erst START drücken!");
    if (!state.liveMarker) return alert("Warte auf GPS Signal...");
    const pos = state.liveMarker.getLatLng();
    const processEntry = (finalData) => {
        const entry = { type, location: { lat: pos.lat, lng: pos.lng },
            timestamp: new Date().toLocaleTimeString('de-DE'), isoDate: new Date().toISOString(), ...finalData };
        state.current.entries.push(entry);
        drawTempMarker(entry);
    };
    if (['mood','thought','sense'].includes(type)) {
        const text = prompt({ mood: "Stimmung beschreiben:", thought: "Gedanke?", sense: "Wahrnehmung?" }[type]);
        if (text === null) return;
        processEntry({ text: text || "(Keine Eingabe)" });
    } else { processEntry(data); }
}

let tempLayerGroup = null;
function drawTempMarker(e) {
    if (!tempLayerGroup) tempLayerGroup = L.layerGroup().addTo(state.map);
    const loc = [e.location.lat, e.location.lng];
    if (['mood','thought','sense'].includes(e.type)) {
        L.circleMarker(loc, { radius: 8, fillColor: '#2563eb', color: '#fff', weight: 2, fillOpacity: 1 })
         .addTo(tempLayerGroup)
         .bindPopup('<b>' + e.type.toUpperCase() + '</b><br>' + (e.text||'') + '<br><small>' + e.timestamp + '</small>');
    } else if (e.type === 'photo') {
        L.marker(loc, { icon: L.divIcon({ html: '📸', className: 'text-lg' }) })
         .addTo(tempLayerGroup).bindPopup('<img src="' + e.photo + '" width="150">');
    } else if (e.type === 'Sound' || e.type === 'Sprachnachricht') {
        L.marker(loc, { icon: L.divIcon({ html: e.type === 'Sound' ? '🔊' : '💬', className: 'text-lg' }) })
         .addTo(tempLayerGroup).bindPopup('<audio controls src="' + e.audioUrl + '"></audio>');
    }
}

// --- VERGLEICH ---
function toggleWalkComparison(id) {
    const walkId = parseInt(id);
    const walk = state.walks.find(w => w.id === walkId);
    if (!walk) return;
    if (state.current) { alert("Bitte beende erst die aktuelle Aufnahme."); updateArchiveUI(); return; }
    if (state.activeComparisonLayers[walkId]) {
        state.map.removeLayer(state.activeComparisonLayers[walkId]);
        delete state.activeComparisonLayers[walkId];
        hideReflectionPanel();
    } else {
        const group = L.layerGroup();
        L.polyline(walk.route, { color: walk.color, weight: 5, className: 'rough-path', opacity: 0.7 }).addTo(group);
        walk.entries.forEach(e => {
            const loc = [e.location.lat, e.location.lng];
            if (['mood','thought','sense'].includes(e.type)) {
                L.circleMarker(loc, { radius: 8, fillColor: walk.color, color: '#fff', weight: 2, fillOpacity: 1 })
                 .addTo(group).bindPopup('<b>' + e.type.toUpperCase() + '</b><br>' + (e.text||'') + '<br><small>' + e.timestamp + '</small>');
            } else if (e.type === 'photo') {
                L.marker(loc, { icon: L.divIcon({ html: '📸', className: 'text-lg' }) })
                 .addTo(group).bindPopup('<img src="' + e.photo + '" width="150">');
            } else if (e.type === 'Sound' || e.type === 'Sprachnachricht') {
                L.marker(loc, { icon: L.divIcon({ html: e.type === 'Sound' ? '🔊' : '💬', className: 'text-lg' }) })
                 .addTo(group).bindPopup('<audio controls src="' + e.audioUrl + '"></audio>');
            }
        });
        group.addTo(state.map);
        state.activeComparisonLayers[walkId] = group;
        showReflectionPanel(walk);
    }
}
function clearAllComparisonLayers() {
    Object.values(state.activeComparisonLayers).forEach(l => state.map.removeLayer(l));
    state.activeComparisonLayers = {}; hideReflectionPanel(); updateArchiveUI();
}

// --- REFLEXION ---
function showReflectionPanel(walk) {
    document.getElementById('reflectionPanel').style.display = 'block';
    document.getElementById('activeWalkName').innerText = walk.name;
    const ta = document.getElementById('reflectionText');
    ta.value = walk.reflection || ""; ta.dataset.activeWalkId = walk.id;
}
function hideReflectionPanel() { document.getElementById('reflectionPanel').style.display = 'none'; }
document.getElementById('saveReflection').onclick = () => {
    const ta = document.getElementById('reflectionText');
    const walk = state.walks.find(w => w.id === parseInt(ta.dataset.activeWalkId));
    if (walk) { walk.reflection = ta.value; saveToLocalStorage(); alert("Reflexion gespeichert."); }
};

// --- STORAGE ---
function saveToLocalStorage() {
    localStorage.setItem('psychogeo_walks', JSON.stringify(state.walks.map(w => ({
        ...w, entries: w.entries.map(e => { const { audioBlob, ...c } = e; return c; })
    }))));
}

// --- ARCHIV ---
function updateArchiveUI() {
    const list = document.getElementById('walkList'); list.innerHTML = "";
    if (!state.walks.length) { list.innerHTML = "<p class='text-xs text-gray-400 p-2'>Noch keine Walks.</p>"; return; }
    state.walks.forEach(w => {
        const div = document.createElement('div'); div.className = "walk-item";
        div.innerHTML = `<input type="checkbox" ${state.activeComparisonLayers[w.id]?'checked':''} onchange="toggleWalkComparison(${w.id})">
            <span class="color-dot" style="background:${w.color}"></span>
            <span class="flex-grow">${w.name}</span>`;
        list.appendChild(div);
    });
}

// --- AUDIO ---
async function handleRecording(buttonId, type) {
    if (!state.current) return alert("Bitte erst START drücken!");
    const btn = document.getElementById(buttonId);
    if (!state.isRecording) {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            state.audioRecorder = new MediaRecorder(stream); state.audioChunks = [];
            state.audioRecorder.ondataavailable = e => state.audioChunks.push(e.data);
            state.audioRecorder.onstop = () => {
                const blob = new Blob(state.audioChunks, { type: 'audio/webm' });
                addEntry(type, { audioUrl: URL.createObjectURL(blob), audioBlob: blob });
            };
            state.audioRecorder.start(); state.isRecording = true;
            btn.innerText = "⏹️"; btn.style.background = "#dc2626";
        } catch(err) { alert("Mikrofon-Zugriff verweigert."); }
    } else {
        state.audioRecorder.stop(); state.isRecording = false;
        btn.innerHTML = type === 'Sound' ? "▶️" : "💬";
        btn.style.background = "";
    }
}
document.getElementById('audioToggle').onclick = () => handleRecording('audioToggle', 'Sound');
document.getElementById('messageToggle').onclick = () => handleRecording('messageToggle', 'Sprachnachricht');
document.getElementById('moodBtn').onclick = () => addEntry('mood');
document.getElementById('thoughtBtn').onclick = () => addEntry('thought');
document.getElementById('senseBtn').onclick = () => addEntry('sense');
document.getElementById('photoBtn').onclick = () => {
    if (!state.current) return alert("Bitte erst START drücken!");
    const input = document.createElement('input'); input.type = 'file'; input.accept = 'image/*';
    input.onchange = e => { const r = new FileReader(); r.onload = ev => addEntry('photo', { photo: ev.target.result }); r.readAsDataURL(e.target.files[0]); };
    input.click();
};

// --- ZIP EXPORT ---
document.getElementById('exportFull').onclick = async () => {
    const numActive = Object.keys(state.activeComparisonLayers).length;
    let walkToExport, isComparison = numActive > 0;
    if (isComparison) {
        walkToExport = state.walks.find(w => w.id == Object.keys(state.activeComparisonLayers)[0]);
    } else { walkToExport = state.current || state.walks[state.walks.length - 1]; }
    if (!walkToExport) return alert("Kein Walk zum Exportieren.");
    const btn = document.getElementById('exportFull'), orig = btn.innerText;
    btn.innerText = "..."; btn.disabled = true;
    const uis = document.querySelectorAll('.top-ui,.side-ui,.bottom-left,.leaflet-control-zoom,.leaflet-control-attribution');
    uis.forEach(el => el.classList.add('no-print'));
    try {
        const zip = new JSZip(), photoFolder = zip.folder("Fotos");
        await new Promise(r => setTimeout(r, 500));
        const canvas = await html2canvas(document.getElementById('map'), {
            useCORS: true, allowTaint: false, logging: false,
            ignoreElements: el => el.classList.contains('no-print')
        });
        zip.file(isComparison ? "VERGLEICH.png" : "KARTE.png", canvas.toDataURL("image/png").split(',')[1], {base64:true});
        let txt = "PROTOKOLL - " + walkToExport.name + "\n\nREFLEXION:\n" + (walkToExport.reflection || "(leer)") + "\n\nEINTRAEGE:\n";
        walkToExport.entries.forEach((e, i) => {
            txt += "[" + e.timestamp + "] " + e.type.toUpperCase() + ": " + (e.text || "") + "\n";
            if (e.type === 'photo' && e.photo) photoFolder.file("Foto_" + i + ".jpg", e.photo.split(',')[1], {base64:true});
        });
        zip.file("PROTOKOLL.txt", txt);
        zip.file("rohdaten.json", JSON.stringify(walkToExport, null, 2));
        const content = await zip.generateAsync({type:"blob"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(content);
        link.download = isComparison ? "Analyse.zip" : "Walk_" + walkToExport.id + ".zip";
        link.click();
    } catch(err) { console.error(err); alert("Export fehlgeschlagen."); }
    finally { uis.forEach(el => el.classList.remove('no-print')); btn.innerText = orig; btn.disabled = false; }
};

initMap();
</script>
</body>
</html>
